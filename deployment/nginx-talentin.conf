# Rate limiting zones
limit_req_zone $binary_remote_addr zone=search_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=120r/m;

# --- Bot / scanner IP blocklist ---
geo $blocked_ip {
    default         0;
    123.58.210.118  1;
    152.32.186.79   1;
    179.43.177.134  1;
    193.19.109.168  1;
    185.177.72.60   1;
    185.177.72.51   1;
    95.215.0.144    1;
    5.189.148.33    1;
    185.186.76.20   1;
}

server {
    listen 80;
    server_name jp.talentin.ai;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jp.talentin.ai;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/jp.talentin.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jp.talentin.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Block known bot IPs immediately (drop connection) ----
    if ($blocked_ip) {
        return 444;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    server_tokens off;

    # Logging
    access_log /var/log/nginx/talentin-access.log;
    error_log /var/log/nginx/talentin-error.log warn;

    # Frontend (React SPA)
    root /var/www/talentin/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- Only proxy KNOWN backend API paths ----

    # Search endpoint — heavy rate limit (expensive AI inference)
    location /api/search {
        limit_req zone=search_limit burst=15 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_intercept_errors on;
    }

    # V2 API endpoints (smart-search, search)
    location /api/v2/ {
        limit_req zone=search_limit burst=15 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Person detail endpoints (profile data)
    location /api/person/ {
        limit_req zone=api_general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Integration API (rate limited)
    location /api/integration/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Known safe API paths: filters, stats, analytics, export, health
    location ~ ^/api/(filters|stats|analytics|export|health) {
        limit_req zone=api_general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ---- CATCH-ALL: unknown /api/* paths — drop connection (never reaches backend) ----
    location /api/ {
        return 444;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    client_max_body_size 10M;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
}
